apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-<server-name>
spec:
  selector:
    matchLabels:
      app: server-<server-name>
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app: server-<server-name>
        stage: production
        kuvel.azisaba.net/enable-server-discovery: "true"
        kuvel.azisaba.net/preferred-server-name: <server-name>
    spec:
      # サーバーを動かしたい物理サーバーを指定する
      nodeName: saba8
      containers:
        - name: server-<server-name>
          # Dockerイメージの指定
          # Javaバージョン早見表
          # 1.14.4以下 ... 8
          # 1.15.x ... 8-11 (9-10はサポート終了)
          # 1.16.x ... 11-16 (12-16はサポート終了)
          # 1.17.x ... 16-17 (16はサポート終了)
          # 1.18.x～1.20.4 ... 17 (一部は21まで可能)
          # 1.20.5〜1.21.x ... 21
          # 26.1以降 ... 25
          image: itzg/minecraft-server:java17
          workingDir: /data
          imagePullPolicy: Always
          resources:
            requests:
              # heap領域(-Xmx)と同じ値か、それ以上にする。requestの値に対して十分な空きメモリがあれば、nodeにコンテナが作成される。
              memory: "8Gi" # k8sだけがこの値を使う。マイクラはこの値を無視し、JVMオプションで指定された値を初期メモリとして要求する。
            limits: # 必ず設定する。これがないと、k8sはマシンに無限のリソースがあると考える。
              cpu: "10000m"
              memory: "12Gi" # limit = heap領域 + off-heap領域 + 余裕分。目安はheap領域(-Xmx)の125%。limitを超えると即座にOOMKillされる。
          ports:
            - containerPort: 25565
          env:
            # タイムゾーン
            - name: TZ
              value: "Asia/Tokyo"
            # EULAに同意する
            - name: EULA
              value: "true"
            # サーバーの種類
            - name: TYPE
              value: PAPER
            # 最適化されたJVMフラグを使用する
            - name: USE_AIKAR_FLAGS
              value: "true"
            # UID
            - name: UID
              value: "0"
            # GID
            - name: GID
              value: "1021"
            # Minecraftバージョン
            - name: VERSION
              value: 1.16.5
            # 割り当てメモリ (-Xmx,-Xms)
            - name: MEMORY
              value: 8G # heap領域の値（固定）。プロセスはこれに加えoff-heap領域を消費する。JVMオプションの -Xmx,-Xms にあたる値。
            # JVM -Dオプション
            - name: JVM_DD_OPTS
              value: "Paper.IgnoreJavaVersion:true"
            # yml内のCFG_なんとかを置き換えるためのもの
            - name: ENV_VARIABLE_PREFIX
              value: "CFG_"
            # メタデータ(サーバー内で環境変数で取得可能)
            - name: CFG_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CFG_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CFG_SERVER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['kuvel.azisaba.net/preferred-server-name']
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['kuvel.azisaba.net/preferred-server-name']
          startupProbe:
            tcpSocket:
              port: 25565
            failureThreshold: 60 # 600秒
            periodSeconds: 10
          volumeMounts:
            - name: server-data
              mountPath: /data
            - name: tab-config
              mountPath: /plugins/TAB/config.yml
              subPath: config.yml
      volumes:
        - name: server-data
          hostPath:
            path: /srv/<server-name>
            type: Directory
        - name: tab-config
          configMap:
            name: common-life-server-tab-config
      priorityClassName: minecraft-other-server
      terminationGracePeriodSeconds: 60 # 1分
---
apiVersion: v1
kind: Service
metadata:
  name: server-<server-name>-svc
spec:
  type: ClusterIP
  selector:
    app: server-<server-name>
    stage: production
  ports:
    - port: 25565
      targetPort: 25565
