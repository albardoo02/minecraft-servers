apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-coasts
spec:
  selector:
    matchLabels:
      app: server-coasts
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app: server-coasts
        stage: production
        kuvel.azisaba.net/enable-server-discovery: "true"
        kuvel.azisaba.net/preferred-server-name: coasts
        kuvel.azisaba.net/disable-load-balancer: "true"
        kuvel.azisaba.net/disable-name-suffix: "true"
    spec:
      serviceAccountName: server-coasts
      containers:
        - name: server-coasts
          # Dockerイメージの指定
          # Javaバージョン早見表
          # 1.14.4以下 ... 8
          # 1.15.x ... 8-11 (9-10はサポート終了)
          # 1.16.x ... 11-16 (12-16はサポート終了)
          # 1.17.x ... 16-17 (16はサポート終了)
          # 1.18.x～1.20.4 ... 17 (一部は21まで可能)
          # 1.20.5〜1.21.x ... 21
          # 26以降 ... 25
          image: itzg/minecraft-server:java21
          workingDir: /data
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "500m"
              # heap領域(-Xmx)と同じ値か、それ以上にする。requestの値に対して十分な空きメモリがあれば、nodeにコンテナが作成される。
              # k8sだけがこの値を使う。マイクラはこの値を無視し、JVMオプションで指定された値を初期メモリとして要求する。
              memory: "8Gi"
            limits: # 必ず設定する。これがないと、k8sはマシンに無限のリソースがあると考える。
              cpu: "5000m"
              memory: "12Gi" # limit = heap領域 + off-heap領域 + 余裕分。目安はheap領域(-Xmx)の125%。limitを超えると即座にOOMKillされる。
          ports:
            - containerPort: 25565
          env:
            # タイムゾーン
            - name: TZ
              value: "Asia/Tokyo"
            # EULAに同意する
            - name: EULA
              value: "true"
            # サーバーの種類
            - name: TYPE
              value: FOLIA
            # 最適化されたJVMフラグを使用する
            - name: USE_AIKAR_FLAGS
              value: "true"
            # Minecraftバージョン
            - name: VERSION
              value: 1.21.11
            # 初期・最大メモリ
            - name: MEMORY
              value: 8G
            # JVM -Dオプション
            - name: JVM_DD_OPTS
              value: "Paper.IgnoreJavaVersion:true"
            # yml内のCFG_なんとかを置き換えるためのもの
            - name: ENV_VARIABLE_PREFIX
              value: "CFG_"
            # メタデータ(サーバー内で環境変数で取得可能)
            - name: CFG_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CFG_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CFG_SERVER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['kuvel.azisaba.net/preferred-server-name']
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['kuvel.azisaba.net/preferred-server-name']
          startupProbe:
            tcpSocket:
              port: 25565
            failureThreshold: 60 # 600秒
            periodSeconds: 10
          volumeMounts:
            - name: server-data
              mountPath: /data
            - name: tab-config
              mountPath: /plugins/TAB/config.yml
              subPath: config.yml
      volumes:
        - name: server-data
          persistentVolumeClaim:
            claimName: server-coasts-data-claim
        - name: tab-config
          configMap:
            name: common-life-server-tab-config
      priorityClassName: minecraft-other-server
      terminationGracePeriodSeconds: 60 # 1分
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: server-coasts-data-claim
spec:
  storageClassName: nfs-client
  accessModes:
  - "ReadWriteMany"
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: server-coasts-svc
spec:
  type: ClusterIP
  selector:
    app: server-coasts
    stage: production
  ports:
    - port: 25565
      targetPort: 25565
---
apiVersion: v1
kind: Service
metadata:
  name: server-coasts-resourcepack-svc
spec:
  type: ClusterIP
  selector:
    app: server-coasts
    stage: production
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: server-coasts
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: server-coasts
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete", "get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: server-coasts
subjects:
  - kind: ServiceAccount
    name: server-coasts
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: server-coasts
